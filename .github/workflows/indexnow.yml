name: IndexNow — auto-submit URLs to Bing/Yandex

on:
  push:
    branches: [main]
    paths:
      - "public/blog/**"
      - "public/sitemap.xml"
      - "index.html"
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for Cloudflare to deploy
        run: sleep 90

      - name: Submit URLs to IndexNow
        run: node scripts/indexnow-submit.mjs
