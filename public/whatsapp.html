<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تواصل عبر واتساب — عامر الودعاني</title>
    <meta name="description" content="تواصل مباشرة عبر واتساب مع عامر الودعاني — مطور ويب وتطبيقات موثّق." />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #050816;
        --panel: #151030;
        --accent: #25d366;
        --accent-dark: #128c7e;
        --text: #f5f5f7;
        --muted: #aaa6c3;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        min-height: 100%;
        font-family: 'Tajawal', system-ui, sans-serif;
        background: radial-gradient(ellipse at top, #1a1340 0%, var(--bg) 55%);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 480px;
        background: rgba(21, 16, 48, 0.85);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 24px;
        padding: 40px 28px;
        text-align: center;
        backdrop-filter: blur(20px);
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      }
      .avatar {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        margin: 0 auto 20px;
        object-fit: cover;
        border: 3px solid var(--accent);
        box-shadow: 0 0 40px rgba(37, 211, 102, 0.35);
      }
      h1 {
        font-size: 26px;
        font-weight: 900;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      .subtitle {
        color: var(--muted);
        font-size: 15px;
        font-weight: 500;
        margin-bottom: 8px;
      }
      .verified {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(37, 211, 102, 0.12);
        color: var(--accent);
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 28px;
      }
      .verified svg { width: 14px; height: 14px; }
      .cta {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        background: var(--accent);
        color: #fff;
        padding: 18px 24px;
        border-radius: 16px;
        font-size: 18px;
        font-weight: 900;
        text-decoration: none;
        transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
      }
      .cta:hover { transform: translateY(-2px); background: var(--accent-dark); box-shadow: 0 14px 40px rgba(37, 211, 102, 0.55); }
      .cta svg { width: 26px; height: 26px; fill: #fff; }
      .meta {
        color: var(--muted);
        font-size: 13px;
        margin-top: 18px;
      }
      .back {
        display: inline-block;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
        margin-top: 22px;
        border-bottom: 1px dashed rgba(170,166,195,0.5);
      }
      .back:hover { color: var(--text); }
    </style>
  </head>
  <body>
    <main class="card">
      <img src="./apple-touch-icon.png" alt="عامر الودعاني" class="avatar" />
      <h1>عامر الودعاني</h1>

        مستقل موثّق

    </main>
  </body>
</html>
